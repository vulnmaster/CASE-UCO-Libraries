name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - ".github/workflows/ci.yml"
      - "generator/**"
      - "python/**"
      - "csharp/**"
      - "java/**"
      - "rust/**"
      - "ontology/**"
      - "Makefile"
  pull_request:
    branches: [main, develop]
    paths:
      - ".github/workflows/ci.yml"
      - "generator/**"
      - "python/**"
      - "csharp/**"
      - "java/**"
      - "rust/**"
      - "ontology/**"
      - "Makefile"

jobs:
  version-sync:
    name: Version Consistency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify __version__ matches pyproject.toml
        run: |
          PYPROJECT_VER=$(python -c "import tomllib; print(tomllib.load(open('python/pyproject.toml','rb'))['project']['version'])")
          INIT_VER=$(python -c "import re, pathlib; m=re.search(r'__version__\s*=\s*\"([^\"]+)\"', pathlib.Path('python/case_uco/__init__.py').read_text()); print(m.group(1))")
          echo "pyproject.toml: $PYPROJECT_VER"
          echo "__init__.py:    $INIT_VER"
          if [ "$PYPROJECT_VER" != "$INIT_VER" ]; then
            echo "::error::Version mismatch: pyproject.toml=$PYPROJECT_VER vs __init__.py=$INIT_VER"
            exit 1
          fi

  generate:
    name: Generate Libraries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install generator dependencies
        run: pip install rdflib jinja2

      - name: Run code generator
        run: |
          PYTHONPATH=generator/src python -m case_uco_generator generate --lang all

      - name: Upload generated sources
        uses: actions/upload-artifact@v7
        with:
          name: generated-sources
          path: |
            python/case_uco/
            csharp/CaseUco/
            csharp/CaseUco.Tests/ExhaustiveInstantiationTests.cs
            java/src/
            rust/src/
            rust/tests/

  test-python:
    name: Test Python
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download generated sources
        uses: actions/download-artifact@v8
        with:
          name: generated-sources
          path: .

      - name: Install dependencies
        run: pip install rdflib jinja2 pytest mypy

      - name: Run tests
        run: PYTHONPATH=generator/src:python python -m pytest generator/tests python/tests -v

      - name: Type check
        run: cd python && mypy case_uco/ --ignore-missing-imports

  test-csharp:
    name: Test C#
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Download generated sources
        uses: actions/download-artifact@v8
        with:
          name: generated-sources
          path: .

      - name: Build and test
        run: |
          cd csharp
          dotnet build
          dotnet test

      - name: Smoke test
        run: cd csharp && dotnet run --project CaseUco.Smoke

  test-java:
    name: Test Java
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Download generated sources
        uses: actions/download-artifact@v8
        with:
          name: generated-sources
          path: .

      - name: Build and test
        run: |
          cd java
          mvn package -q

      - name: Smoke test
        run: cd java && mvn -q compile exec:java

  test-rust:
    name: Test Rust
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Download generated sources
        uses: actions/download-artifact@v8
        with:
          name: generated-sources
          path: .

      - name: Clippy lint
        run: cd rust && cargo clippy -- -D warnings

      - name: Build and test
        run: |
          cd rust
          cargo build
          cargo test

      - name: Smoke test
        run: cd rust && cargo run --example smoke

  test-docs:
    name: Test Doc Snippets
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download generated sources
        uses: actions/download-artifact@v8
        with:
          name: generated-sources
          path: .

      - name: Install Python SDK
        run: pip install -e python/

      - name: Test documentation snippets
        run: python scripts/test_doc_snippets.py
